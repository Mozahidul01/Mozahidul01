name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12am UTC
    - cron: '0 0 * * *'
  # also refresh on push so it doesn't wait for the nightly schedule
  push:
    branches:
      - master

# default to read-only; the job below opts into write
permissions:
  contents: read

jobs:
  update-readme:
    name: WakaReadme YTD
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build year-to-date WakaTime block
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python3 .github/scripts/waka_ytd.py

      - name: Commit refreshed stats (only if changed)
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(waka): refresh year-to-date coding stats"
            git push
          else
            echo "README already up to date."
          fi
