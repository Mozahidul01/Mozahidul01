name: 3D Contribution Graph

on:
  # nightly + manual only — NOT on push (avoids racing other workflows that
  # commit to master; they'd reject each other on non-fast-forward push)
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

# read-only by default; the job opts into write
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@5b718734e8da645411919f0ae9ab9e7f9377158f # v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push (only if changed)
        run: |
          if [[ -n "$(git status --porcelain profile-3d-contrib)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile-3d-contrib
            git commit -m "chore(3d): refresh 3D contribution graph"
            git push
          else
            echo "No change in 3D graph."
          fi
